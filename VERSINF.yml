version: v3.0
notes:
  - "Live server beacon: pings the real game servers to show when an unstable region (Ohio, Canada, London) is actually online, in real time — faster than the public queue API."
  - "Hard Region Lock (firewall), now scoped to just Dead by Daylight, so DBD can't fall back to N. Virginia."
  - "System tray with a green/red status bubble, plus notifications when your server comes online."
  - "Revert to Default now unticks every region and clears the firewall too."
